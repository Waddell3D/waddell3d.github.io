<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap');

:root {
  --dirt:   #c8a96e;
  --forest: #3d5a3e;
  --bark:   #1a1208;
  --moss:   #6b7c4a;
  --stone:  #8a8070;
  --cream:  #f0e8d8;
  --ember:  #e8622a;
  --panel:  #12100a;
  --border: rgba(200,169,110,0.25);
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;background:var(--bark);color:var(--cream);font-family:'Barlow Condensed',sans-serif;overflow:hidden;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
#topbar{
  height:48px;min-height:48px;
  background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;padding:0;
}
#app-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--cream);padding:0 20px;border-right:1px solid var(--border);white-space:nowrap;
}
#app-title span{color:var(--dirt);}
#app-subtitle{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--stone);
  padding:0 16px;letter-spacing:.5px;
}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:0;}
.topbar-btn{
  display:flex;align-items:center;gap:6px;
  padding:0 16px;height:48px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;
  color:var(--stone);cursor:pointer;border:none;background:transparent;
  border-left:1px solid var(--border);transition:all .2s;white-space:nowrap;
}
.topbar-btn:hover{color:var(--cream);background:rgba(200,169,110,0.06);}
.topbar-btn.primary{color:var(--dirt);}
.topbar-btn.primary:hover{background:rgba(200,169,110,0.12);}
.topbar-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
#edit-hint{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--moss);
  padding:0 16px;letter-spacing:.5px;border-left:1px solid var(--border);
  height:48px;display:flex;align-items:center;
}

/* ── MAIN LAYOUT ── */
#main{flex:1;display:flex;overflow:hidden;}
#map-pane{flex:1;position:relative;}
#map{width:100%;height:100%;}
.leaflet-control-attribution{font-size:9px!important;opacity:.4;}

/* ── SIDE PANEL ── */
#side-panel{
  width:320px;min-width:320px;
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#panel-header{
  padding:12px 14px 10px;border-bottom:1px solid var(--border);
  background:rgba(200,169,110,0.04);flex-shrink:0;
}
#panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--dirt);}
#panel-subtitle{font-family:'DM Mono',monospace;font-size:9px;color:var(--stone);margin-top:2px;letter-spacing:.3px;}

/* ── CHECKPOINT LIST (fixed) ── */
#checkpoints-section{border-bottom:1px solid var(--border);flex-shrink:0;}
.section-header{
  padding:7px 14px;font-size:9px;font-weight:700;letter-spacing:2px;
  color:var(--moss);text-transform:uppercase;background:rgba(0,0,0,.15);
}
.cp-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 14px;border-bottom:1px solid rgba(200,169,110,.06);
  cursor:pointer;transition:background .15s;
}
.cp-item:hover{background:rgba(200,169,110,.05);}
.cp-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:rgba(200,169,110,.3);border:1.5px solid var(--dirt);
}
.cp-name{font-size:12px;font-weight:600;color:var(--cream);}
.cp-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--stone);margin-top:1px;}

/* ── NOTES LIST (scrollable) ── */
#notes-section{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#notes-list{flex:1;overflow-y:auto;}
.note-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.note-item:hover{background:rgba(200,169,110,.05);}
.note-item.selected{background:rgba(200,169,110,.09);border-left:2px solid var(--dirt);}
.note-icon{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;
}
.note-icon.info    {background:rgba(200,169,110,.15);color:var(--dirt);border:1px solid rgba(200,169,110,.4);}
.note-icon.crew    {background:rgba(61,90,62,.3);color:#a8d48a;border:1px solid rgba(107,124,74,.5);}
.note-icon.caution {background:rgba(232,98,42,.15);color:var(--ember);border:1px solid rgba(232,98,42,.4);}
.note-icon.parking {background:rgba(100,149,237,.15);color:#7ab3f5;border:1px solid rgba(100,149,237,.4);}
.note-body{flex:1;min-width:0;}
.note-name{font-size:13px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-desc{font-size:11px;color:rgba(240,232,216,.5);margin-top:2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.note-actions{display:flex;gap:3px;flex-shrink:0;}
.note-btn{
  width:20px;height:20px;border:1px solid var(--border);border-radius:2px;
  background:transparent;color:var(--stone);cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.note-btn:hover{color:var(--cream);border-color:var(--stone);}
.note-btn.del:hover{color:#c0452a;border-color:#c0452a;}

.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;text-align:center;color:var(--stone);
}
.empty-state .icon{font-size:28px;margin-bottom:10px;opacity:.4;}
.empty-state p{font-size:12px;line-height:1.5;max-width:200px;}

/* ── NOTE EDITOR FORM ── */
#note-editor{
  border-top:1px solid var(--border);background:rgba(200,169,110,.03);
  padding:12px;flex-shrink:0;
}
#note-editor.hidden{display:none;}
.form-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--moss);text-transform:uppercase;margin-bottom:10px;}
.form-row{margin-bottom:8px;}
.form-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--stone);text-transform:uppercase;margin-bottom:3px;display:block;}
.form-input{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:13px;
  padding:6px 8px;border-radius:2px;outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:rgba(200,169,110,.6);}
select.form-input{cursor:pointer;}
textarea.form-input{resize:vertical;min-height:60px;line-height:1.4;}
.form-actions{display:flex;gap:6px;margin-top:10px;}
.form-btn{
  flex:1;padding:7px;font-family:'Barlow Condensed',sans-serif;font-size:12px;
  font-weight:700;letter-spacing:1px;border:1px solid var(--border);border-radius:2px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.form-btn.save{background:rgba(61,90,62,.5);color:var(--cream);border-color:var(--moss);}
.form-btn.save:hover{background:var(--forest);}
.form-btn.cancel{background:transparent;color:var(--stone);}
.form-btn.cancel:hover{color:var(--cream);}

/* ── FLOATING MAP LABELS ── */
.map-label{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;
  color:#f0e8d8;white-space:nowrap;pointer-events:none;
  text-shadow:-1px -1px 0 rgba(0,0,0,.9),1px -1px 0 rgba(0,0,0,.9),
    -1px 1px 0 rgba(0,0,0,.9),1px 1px 0 rgba(0,0,0,.9),0 2px 6px rgba(0,0,0,.7);
  padding-bottom:4px;transform:translateX(-50%);display:inline-block;
}
.map-label.start {color:#b8d4a0;}
.map-label.finish{color:#f4a07a;}
.map-label.aid   {color:#e8c97a;}

/* ── MAP CLICK HINT ── */
#map-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(18,13,8,.88);border:1px solid var(--border);border-radius:3px;
  padding:5px 12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--stone);
  letter-spacing:.5px;z-index:1000;pointer-events:none;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(61,90,62,.9);border:1px solid var(--moss);border-radius:3px;
  padding:7px 18px;font-family:'DM Mono',monospace;font-size:10px;color:var(--cream);
  letter-spacing:.5px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(200,169,110,.2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:rgba(200,169,110,.4);}
</style>
</head>

<div id="topbar">
  <div id="app-title">M2W <span>100k</span></div>
  <div id="app-subtitle">Melbourne to Warburton · Course Planner</div>
  <div id="topbar-right">
    <div id="edit-hint" style="display:none">Click map to place a note</div>
    <button class="topbar-btn" id="btn-fit" onclick="fitCourse()">
      <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      Fit Course
    </button>
    <button class="topbar-btn primary" id="btn-export" onclick="exportForCrew()" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      Export for Crew
    </button>
  </div>
</div>

<div id="main">
  <div id="map-pane">
    <div id="map"></div>
    <div id="map-hint" style="display:none">Click anywhere on the map to add a note</div>

  <div id="side-panel">
    <div id="panel-header">
      <div id="panel-title">Course Notes</div>
      <div id="panel-subtitle">Melbourne to Warburton 100k</div>
    </div>

    <!-- Fixed checkpoints -->
    <div id="checkpoints-section">
      <div class="section-header">Aid Stations</div>
      <div id="checkpoint-list"></div>
    </div>

    <!-- Scrollable notes -->
    <div id="notes-section">
      <div class="section-header">Notes &amp; Labels</div>
      <div id="notes-list">
        <div class="empty-state">
          <div class="icon">📍</div>
          <p id="empty-msg">No notes yet.</p>
        </div>
      </div>
      <div id="note-editor" class="hidden">
        <div class="form-title" id="editor-title">New Note</div>
        <div class="form-row">
          <label class="form-label">Title</label>
          <input type="text" id="note-name" class="form-input" placeholder="e.g. Gate access — code 1234">
        </div>
        <div class="form-row">
          <label class="form-label">Type</label>
          <select id="note-type" class="form-input">
            <option value="info">Info</option>
            <option value="crew">Crew Access</option>
            <option value="caution">Caution</option>
            <option value="parking">Parking</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Details</label>
          <textarea id="note-desc" class="form-input" placeholder="Directions, access codes, things to know…"></textarea>
        </div>
        <div class="form-actions">
          <button class="form-btn save" onclick="saveNote()">Save Note</button>
          <button class="form-btn cancel" onclick="cancelNote()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

const AID_STATIONS = [
  {name:"Checkpoint 1",desc:"Kew Golf Club",lat:-37.78167,lon:145.06252,distKm:19.839},
  {name:"Checkpoint 2",desc:"JW Manson Reserve",lat:-37.83981,lon:145.234469,distKm:42.283},
  {name:"Checkpoint 3",desc:"Fred Geale Oval",lat:-37.80336,lon:145.2843,distKm:49.877},
  {name:"Checkpoint 4",desc:"Lillydale Lake",lat:-37.76446,lon:145.35662,distKm:59.234},
  {name:"Checkpoint 5",desc:"The Trail Cafe",lat:-37.78853,lon:145.38709,distKm:67.966},
  {name:"Checkpoint 6",desc:"Seville Station",lat:-37.76643,lon:145.460289,distKm:75.469},
  {name:"Checkpoint 7",desc:"Woori Yallock Station",lat:-37.77543,lon:145.52875,distKm:82.933},

];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let notes = [];
let noteIdCounter = 1;
let editingId = null;
let selectedId = null;
let pendingLatLng = null;
const noteMarkers = {};

// ══════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════
const map = L.map('map', {
  center: [-37.78, 145.3], zoom: 10,
  zoomControl: true, attributionControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

// Route
L.polyline(TRACK_POINTS, {color:'#f5e642', weight:3, opacity:0.8, lineJoin:'round'}).addTo(map);

function addLabelMarker(latlng, labelText, cssClass) {
  const icon = L.divIcon({
    className: '',
    html: `<div class="map-label ${cssClass}">${labelText}</div>`,
    iconSize: null, iconAnchor: [0, 22],
  });
  L.marker(latlng, {icon, interactive:false, zIndexOffset:500}).addTo(map);
}

// Start / finish
L.circleMarker(TRACK_POINTS[0], {radius:12,color:'#6b7c4a',fillColor:'#3d5a3e',fillOpacity:1,weight:2})
  .bindPopup('<b>START</b><br>Melbourne').addTo(map);
addLabelMarker(TRACK_POINTS[0], 'START', 'start');

L.circleMarker(TRACK_POINTS[TRACK_POINTS.length-1], {radius:12,color:'#c8a96e',fillColor:'#e8622a',fillOpacity:1,weight:2})
  .bindPopup('<b>FINISH</b><br>Warburton').addTo(map);
addLabelMarker(TRACK_POINTS[TRACK_POINTS.length-1], 'FINISH', 'finish');

// Aid station markers
AID_STATIONS.forEach(cp => {
  const marker = L.circleMarker([cp.lat, cp.lon], {
    radius:12, color:'#c8a96e', fillColor:'#2a1f14', fillOpacity:1, weight:2
  }).addTo(map);
  marker.bindPopup(`<b>${cp.name}</b><br>${cp.desc}<br><span style="color:#8a8070;font-size:11px">${cp.distKm.toFixed(1)} km</span>`);
  addLabelMarker([cp.lat, cp.lon], cp.name, 'aid');
});

// Map click — add note (edit mode only)
if (EDIT_MODE) {
  map.on('click', e => {
    pendingLatLng = e.latlng;
    openEditor(null, e.latlng.lat, e.latlng.lng);
  });
}

// ══════════════════════════════════════════
// NOTE TYPE CONFIG
// ══════════════════════════════════════════
const NOTE_COLORS = {
  info:    '#c8a96e',
  crew:    '#7ac87a',
  caution: '#e8622a',
  parking: '#7ab3f5',
};
const NOTE_ICONS = { info:'i', crew:'C', caution:'!', parking:'P' };
const NOTE_LABELS = { info:'Info', crew:'Crew Access', caution:'Caution', parking:'Parking' };

// ══════════════════════════════════════════
// MAP MARKERS FOR NOTES
// ══════════════════════════════════════════
function addNoteMarker(note) {
  const color = NOTE_COLORS[note.type] || NOTE_COLORS.info;
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;border-radius:50%;
      background:${color};border:2px solid rgba(240,232,216,.9);
      box-shadow:0 2px 8px rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      color:#12100a;cursor:pointer;transform:translate(-50%,-50%);
    ">${NOTE_ICONS[note.type]||'i'}</div>`,
    iconSize: [0, 0], iconAnchor: [0, 0],
  });
  const marker = L.marker([note.lat, note.lon], {icon, draggable: EDIT_MODE});
  marker.bindPopup(`<b>${escHtml(note.name)}</b>${note.desc ? '<br>'+escHtml(note.desc) : ''}`);

  if (EDIT_MODE) {
    marker.on('dragend', e => {
      const ll = e.target.getLatLng();
      const idx = notes.findIndex(n => n.id === note.id);
      if (idx >= 0) { notes[idx].lat = ll.lat; notes[idx].lon = ll.lng; }
      saveToStorage();
    });
    marker.on('click', () => { selectNote(note.id); openEditor(notes.find(n=>n.id===note.id)); });
  } else {
    marker.on('click', () => selectNote(note.id));
  }

  noteMarkers[note.id] = marker;
  marker.addTo(map);
}

function removeNoteMarker(id) {
  if (noteMarkers[id]) { map.removeLayer(noteMarkers[id]); delete noteMarkers[id]; }
}

// ══════════════════════════════════════════
// EDITOR
// ══════════════════════════════════════════
function openEditor(note, lat, lon) {
  if (!EDIT_MODE) return;
  editingId = note ? note.id : null;
  const editor = document.getElementById('note-editor');
  editor.classList.remove('hidden');
  document.getElementById('editor-title').textContent = note ? 'Edit Note' : 'New Note';
  document.getElementById('note-name').value = note?.name ?? '';
  document.getElementById('note-type').value = note?.type ?? 'info';
  document.getElementById('note-desc').value = note?.desc ?? '';
  document.getElementById('note-name').focus();
}

function saveNote() {
  const name = document.getElementById('note-name').value.trim();
  if (!name) { toast('Please enter a title.'); return; }
  const type = document.getElementById('note-type').value;
  const desc = document.getElementById('note-desc').value.trim();

  if (editingId !== null) {
    const idx = notes.findIndex(n => n.id === editingId);
    if (idx >= 0) {
      notes[idx] = { ...notes[idx], name, type, desc };
      removeNoteMarker(editingId);
      addNoteMarker(notes[idx]);
    }
  } else {
    const note = { id: noteIdCounter++, name, type, desc, lat: pendingLatLng.lat, lon: pendingLatLng.lng };
    notes.push(note);
    addNoteMarker(note);
  }

  cancelNote();
  renderNoteList();
  saveToStorage();
  toast('Note saved');
}

function cancelNote() {
  editingId = null;
  pendingLatLng = null;
  document.getElementById('note-editor').classList.add('hidden');
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  removeNoteMarker(id);
  if (editingId === id) cancelNote();
  if (selectedId === id) selectedId = null;
  renderNoteList();
  saveToStorage();
  toast('Note deleted');
}

function selectNote(id) {
  selectedId = id;
  renderNoteList();
  const note = notes.find(n => n.id === id);
  if (note) map.panTo([note.lat, note.lon]);
}

// ══════════════════════════════════════════
// NOTE LIST
// ══════════════════════════════════════════
function renderNoteList() {
  const list = document.getElementById('notes-list');
  if (!notes.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📍</div><p id="empty-msg">${EDIT_MODE ? 'Click anywhere on the map to place a note.' : 'No notes have been added.'}</p></div>`;
    return;
  }
  list.innerHTML = '';
  notes.forEach(note => {
    const el = document.createElement('div');
    el.className = 'note-item' + (selectedId === note.id ? ' selected' : '');
    el.innerHTML = `
      <div class="note-icon ${note.type}">${NOTE_ICONS[note.type]||'i'}</div>
      <div class="note-body">
        <div class="note-name">${escHtml(note.name)}</div>
        ${note.desc ? `<div class="note-desc">${escHtml(note.desc)}</div>` : ''}
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--stone);margin-top:2px;">${NOTE_LABELS[note.type]||'Info'}</div>
      </div>
      ${EDIT_MODE ? `<div class="note-actions">
        <button class="note-btn" title="Edit" onclick="event.stopPropagation();openEditor(notes.find(n=>n.id===${note.id}))">✎</button>
        <button class="note-btn del" title="Delete" onclick="event.stopPropagation();deleteNote(${note.id})">✕</button>
      </div>` : ''}`;
    el.onclick = () => selectNote(note.id);
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════
// CHECKPOINT LIST
// ══════════════════════════════════════════
function renderCheckpointList() {
  const list = document.getElementById('checkpoint-list');
  list.innerHTML = '';
  AID_STATIONS.forEach(cp => {
    const el = document.createElement('div');
    el.className = 'cp-item';
    el.innerHTML = `
      <div class="cp-dot"></div>
      <div>
        <div class="cp-name">${cp.name}</div>
        <div class="cp-meta">${cp.desc} · ${cp.distKm.toFixed(1)} km</div>
      </div>`;
    el.onclick = () => map.setView([cp.lat, cp.lon], 14);
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════
// FIT COURSE
// ══════════════════════════════════════════
function fitCourse() {
  const bounds = L.latLngBounds(TRACK_POINTS);
  map.fitBounds(bounds, {padding: [30, 30]});
}

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
function saveToStorage() {
  try { localStorage.setItem('m2w_planner_notes', JSON.stringify(notes)); } catch(e) {}
}

function loadNotes(source) {
  notes = source.map(n => ({ ...n, id: n.id ?? noteIdCounter++ }));
  const maxId = notes.reduce((m, n) => Math.max(m, n.id), 0);
  noteIdCounter = maxId + 1;
  notes.forEach(addNoteMarker);
  renderNoteList();
}

// ══════════════════════════════════════════
// EXPORT FOR CREW
// Generates a copy of this HTML with notes
// embedded and EDIT_MODE set to false.
// ══════════════════════════════════════════
function exportForCrew() {
  if (!EDIT_MODE) return;
  const notesJson = JSON.stringify(notes, null, 2)
    .split('\n').map((l, i) => i === 0 ? l : '  ' + l).join('\n');

  fetch(window.location.href)
    .then(r => r.text())
    .then(html => {
      let out = html
        .replace(/const EDIT_MODE\s*=\s*true/, 'const EDIT_MODE = false')
        .replace(/const EMBEDDED_NOTES\s*=\s*\[[\s\S]*?\];/, `const EMBEDDED_NOTES = ${notesJson};`);
      const blob = new Blob([out], {type: 'text/html'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'm2w_course_planner_crew.html';
      a.click();
      URL.revokeObjectURL(a.href);
      toast('Exported for crew — share the downloaded file');
    })
    .catch(() => {
      // Fallback: copy notes JSON to clipboard
      navigator.clipboard.writeText(JSON.stringify(notes, null, 2))
        .then(() => toast('Could not fetch source — notes JSON copied to clipboard instead'))
        .catch(() => toast('Export failed. Open via a local server (python -m http.server).'));
    });
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderCheckpointList();
fitCourse();

if (EDIT_MODE) {
  document.getElementById('btn-export').style.display = '';
  document.getElementById('edit-hint').style.display = '';
  document.getElementById('map-hint').style.display = '';
}

// Load notes: prefer embedded (crew export), fall back to localStorage
if (EMBEDDED_NOTES.length) {
  loadNotes(EMBEDDED_NOTES);
} else {
  try {
    const stored = localStorage.getItem('m2w_planner_notes');
    if (stored) loadNotes(JSON.parse(stored));
    else renderNoteList();
  } catch(e) { renderNoteList(); }
}
</script>
